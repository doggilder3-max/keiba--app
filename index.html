<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:15px; }

.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }

input, select, button { padding:8px; margin:5px; cursor:pointer; }

#userInfo { font-weight:bold; margin:10px 0; }

.good { color:green; font-weight:bold; }
.bad { color:red; font-weight:bold; }

.deleteBtn, .editBtn{
  border:none;
  padding:5px 8px;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
  margin-left:5px;
}

.deleteBtn{ background:#ff4d4d; color:#fff; }
.editBtn{ background:#4d79ff; color:#fff; }
</style>

</head>
<body>

<h2>🏇 競馬収支ダッシュボード</h2>

<div id="userInfo">未ログイン</div>

<button id="loginBtn">Googleログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<!-- 入力 -->
<div class="card">
  <h3>収支入力</h3>

  <input id="date" type="date">
  <input id="bet" type="number" placeholder="投資額">
  <input id="pay" type="number" placeholder="回収額">

  <!-- ★追加：競馬場 -->
  <input id="place" type="text" placeholder="競馬場（東京・中山など）">

  <!-- ★追加：騎手 -->
  <input id="jockey" type="text" placeholder="騎手（川田・ルメールなど）">

  <select id="type">
    <option>単勝</option>
    <option>複勝</option>
    <option>ワイド</option>
    <option>馬連</option>
    <option>馬単</option>
    <option>3連複</option>
    <option>3連単</option>
  </select>

  <button id="saveBtn">保存</button>
</div>

<!-- フィルター -->
<div class="card">
  <h3>🔍 フィルター</h3>

  <select id="filterType">
    <option value="all">全て</option>
    <option>単勝</option>
    <option>複勝</option>
    <option>ワイド</option>
    <option>馬連</option>
    <option>馬単</option>
    <option>3連複</option>
    <option>3連単</option>
  </select>

  <input id="filterMonth" type="month">

  <button onclick="loadData()">適用</button>
</div>

<!-- サマリー -->
<div class="card">
  <h3>📊 収支合計</h3>
  <div id="summary"></div>
</div>

<!-- グラフ -->
<div class="card">
  <h3>📈 収支グラフ</h3>
  <canvas id="chart"></canvas>
</div>

<!-- 履歴 -->
<div class="card">
  <h3>📋 履歴</h3>
  <div id="history"></div>
</div>

<!-- 月別 -->
<div class="card">
  <h3>🗓 月別集計</h3>
  <div id="monthly"></div>
</div>

<!-- ★追加：競馬場別 -->
<div class="card">
  <h3>🏟 競馬場別収支</h3>
  <div id="placeStats"></div>
</div>

<!-- ★追加：騎手別 -->
<div class="card">
  <h3>🏇 騎手別収支</h3>
  <div id="jockeyStats"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore, collection, addDoc, getDocs,
  query, orderBy, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
  authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
  projectId: "keiba-dashboard-1f6c4",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let chartInstance = null;

// =====================
loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
logoutBtn.onclick = () => signOut(auth);

// =====================
onAuthStateChanged(auth, (user) => {
  currentUser = user;

  if (user) {
    userInfo.innerText = `ログイン中：${user.email}`;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    loadData();
  } else {
    userInfo.innerText = "未ログイン";
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }
});

// =====================
// 保存
// =====================
saveBtn.onclick = async () => {

  if (!currentUser) return alert("ログインしてください");

  await addDoc(collection(db,"bets"), {
    uid: currentUser.uid,
    date: date.value,
    bet: Number(bet.value),
    pay: Number(pay.value),
    type: type.value,

    // ★追加
    place: place.value,
    jockey: jockey.value,

    createdAt: new Date()
  });

  loadData();
};

// =====================
// 削除
// =====================
window.del = async (id) => {
  await deleteDoc(doc(db,"bets",id));
  loadData();
};

// =====================
// 編集
// =====================
window.edit = async (id, v) => {

  const newBet = prompt("投資額", v.bet);
  const newPay = prompt("回収額", v.pay);

  await updateDoc(doc(db,"bets",id), {
    bet: Number(newBet),
    pay: Number(newPay)
  });

  loadData();
};

// =====================
// データ取得
// =====================
async function loadData() {

  if (!currentUser) return;

  const q = query(collection(db,"bets"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);

  let totalBet = 0;
  let totalPay = 0;

  let placeStats = {};
  let jockeyStats = {};

  let html = "";

  snap.forEach(d => {

    const v = d.data();

    if (v.uid !== currentUser.uid) return;

    totalBet += v.bet;
    totalPay += v.pay;

    // ★競馬場集計
    if (!placeStats[v.place]) placeStats[v.place] = {bet:0,pay:0};
    placeStats[v.place].bet += v.bet;
    placeStats[v.place].pay += v.pay;

    // ★騎手集計
    if (!jockeyStats[v.jockey]) jockeyStats[v.jockey] = {bet:0,pay:0};
    jockeyStats[v.jockey].bet += v.bet;
    jockeyStats[v.jockey].pay += v.pay;

    html += `
      <div>
        ${v.date} | ${v.type} | ${v.place || "-"} | ${v.jockey || "-"}
        投資:${v.bet} 回収:${v.pay}
        <button class="editBtn" onclick='edit("${d.id}",${JSON.stringify(v)})'>修正</button>
        <button class="deleteBtn" onclick="del('${d.id}')">削除</button>
      </div>
    `;
  });

  const rate = totalBet ? (totalPay / totalBet) * 100 : 0;

  summary.innerHTML = `
    <p>総投資：${totalBet}</p>
    <p>総回収：${totalPay}</p>
    <p class="${rate>=100?'good':'bad'}">回収率：${rate.toFixed(2)}%</p>
  `;

  history.innerHTML = html;

  // ★競馬場表示
  let phtml = "";
  for (let k in placeStats) {
    const r = placeStats[k].pay - placeStats[k].bet;
    phtml += `<div>${k || "未設定"}：${r}円</div>`;
  }
  placeStatsDiv.innerHTML = phtml;

  // ★騎手表示
  let jhtml = "";
  for (let k in jockeyStats) {
    const r = jockeyStats[k].pay - jockeyStats[k].bet;
    jhtml += `<div>${k || "未設定"}：${r}円</div>`;
  }
  jockeyStatsDiv.innerHTML = jhtml;
}

</script>

</body>
</html>
