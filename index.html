<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:15px; }

.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }

input, select, button { padding:8px; margin:5px; cursor:pointer; }

#userInfo { font-weight:bold; margin:10px 0; }

.good { color:green; font-weight:bold; }
.bad { color:red; font-weight:bold; }
</style>

</head>

<body>

<h2>🏇 競馬収支ダッシュボード</h2>

<div id="userInfo">未ログイン</div>

<button id="loginBtn">Googleログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<!-- 入力 -->
<div class="card">
  <h3>収支入力</h3>

  <input id="date" type="date">
  <input id="bet" type="number" placeholder="投資額">
  <input id="pay" type="number" placeholder="回収額">

  <select id="type">
    <option>単勝</option>
    <option>複勝</option>
    <option>ワイド</option>
    <option>馬連</option>
    <option>馬単</option>
    <option>3連複</option>
    <option>3連単</option>
  </select>

  <button id="saveBtn">保存</button>
</div>

<!-- KPI -->
<div class="card">
  <h3>📊 収支サマリー</h3>
  <div id="summary"></div>
</div>

<!-- グラフ -->
<div class="card">
  <h3>📈 収支推移</h3>
  <canvas id="chart"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
  authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
  projectId: "keiba-dashboard-1f6c4",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let chart = null;

// =====================
// ログイン
// =====================
loginBtn.onclick = () => {
  signInWithPopup(auth, new GoogleAuthProvider());
};

logoutBtn.onclick = () => {
  signOut(auth);
};

// =====================
// 状態監視
// =====================
onAuthStateChanged(auth, (u) => {

  user = u;

  if (u) {
    userInfo.innerText = u.email;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    load();
  } else {
    userInfo.innerText = "未ログイン";
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }
});

// =====================
// 保存
// =====================
saveBtn.onclick = async () => {

  if (!user) return alert("ログインしてください");

  await addDoc(collection(db,"bets"), {
    uid: user.uid,
    date: date.value,
    bet: Number(bet.value),
    pay: Number(pay.value),
    type: type.value,
    createdAt: new Date()
  });

  load();
};

// =====================
// 読み込み（ここが修正ポイント）
// =====================
async function load() {

  const q = query(collection(db,"bets"), orderBy("createdAt","asc"));
  const snap = await getDocs(q);

  let totalBet = 0;
  let totalPay = 0;

  let labels = [];
  let cumulative = [];
  let sum = 0;

  // 券種別（意味を持たせる）
  let typeStats = {
    "単勝": {bet:0,pay:0},
    "複勝": {bet:0,pay:0},
    "ワイド": {bet:0,pay:0},
    "馬連": {bet:0,pay:0},
    "馬単": {bet:0,pay:0},
    "3連複": {bet:0,pay:0},
    "3連単": {bet:0,pay:0}
  };

  snap.forEach(d => {

    const v = d.data();

    if (!user || v.uid !== user.uid) return;

    totalBet += v.bet;
    totalPay += v.pay;

    // 券種別集計
    if (typeStats[v.type]) {
      typeStats[v.type].bet += v.bet;
      typeStats[v.type].pay += v.pay;
    }

    // 累積収支
    sum += (v.pay - v.bet);

    labels.push(v.date);
    cumulative.push(sum);
  });

  const rate = totalBet ? (totalPay / totalBet) * 100 : 0;

  // KPI
  summary.innerHTML = `
    <p>総投資：${totalBet}円</p>
    <p>総回収：${totalPay}円</p>
    <p class="${rate >= 100 ? 'good':'bad'}">回収率：${rate.toFixed(2)}%</p>
  `;

  // グラフ
  if (chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: "収支推移（累積）",
        data: cumulative,
        tension: 0.2
      }]
    }
  });

  console.log("券種別データ:", typeStats);
}

</script>

</body>
</html>
