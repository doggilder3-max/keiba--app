<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
input, button { padding: 10px; margin: 5px 0; width: 100%; }
.card { background: white; padding: 15px; margin-top: 10px; border-radius: 10px; }
.item { border-bottom: 1px solid #ddd; padding: 10px 0; }
.win { color: green; }
.lose { color: red; }
</style>
</head>
<body>

<h2>競馬収支管理</h2>

<input type="date" id="date">
<input type="number" id="bet" placeholder="投資額">
<input type="number" id="win" placeholder="回収額">
<button onclick="addData()">追加</button>

<div class="card">
<p>合計投資：<span id="totalBet">0</span>円</p>
<p>合計回収：<span id="totalWin">0</span>円</p>
<p>収支：<span id="profit">0</span>円</p>
<p>回収率：<span id="rate">0</span>%</p>
</div>

<div class="card">
<h3>今月の収支</h3>
<p>投資：<span id="monthBet">0</span>円</p>
<p>回収：<span id="monthWin">0</span>円</p>
<p>収支：<span id="monthProfit">0</span>円</p>
<p>回収率：<span id="monthRate">0</span>%</p>
</div>

<div class="card">
<h3>履歴</h3>
<div id="history"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("keiba")) || [];

// 日付自動
document.getElementById("date").valueAsDate = new Date();

function addData(){
  let date = document.getElementById("date").value;
  let bet = Number(document.getElementById("bet").value);
  let win = Number(document.getElementById("win").value);

  if(!bet && !win) return;

  data.push({date, bet, win});
  localStorage.setItem("keiba", JSON.stringify(data));
  update();
}

function deleteData(index){
  data.splice(index,1);
  localStorage.setItem("keiba", JSON.stringify(data));
  update();
}

function update(){
  let totalBet = data.reduce((a,b)=>a+b.bet,0);
  let totalWin = data.reduce((a,b)=>a+b.win,0);

  document.getElementById("totalBet").textContent = totalBet;
  document.getElementById("totalWin").textContent = totalWin;
  document.getElementById("profit").textContent = totalWin - totalBet;
  document.getElementById("rate").textContent =
    totalBet ? ((totalWin/totalBet)*100).toFixed(1) : 0;

  // ★ 月別
  let now = new Date();
  let currentMonth = now.toISOString().slice(0,7);

  let monthData = data.filter(d => d.date && d.date.startsWith(currentMonth));

  let monthBet = monthData.reduce((a,b)=>a+b.bet,0);
  let monthWin = monthData.reduce((a,b)=>a+b.win,0);

  document.getElementById("monthBet").textContent = monthBet;
  document.getElementById("monthWin").textContent = monthWin;
  document.getElementById("monthProfit").textContent = monthWin - monthBet;
  document.getElementById("monthRate").textContent =
    monthBet ? ((monthWin/monthBet)*100).toFixed(1) : 0;

  // 履歴
  let html = "";
  data.slice().reverse().forEach((d,i)=>{
    let profit = d.win - d.bet;
    let cls = profit >= 0 ? "win" : "lose";

    html += `
    <div class="item">
      <div>${d.date}</div>
      <div>投資 ${d.bet}円 / 回収 ${d.win}円</div>
      <div class="${cls}">収支 ${profit}円</div>
      <button onclick="deleteData(${data.length-1-i})">削除</button>
    </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

update();
</script>

</body>
</html>
