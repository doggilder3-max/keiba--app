};

function uniqueArray(arr){
return [...new Set(arr)];
}

const allLocalJockeys = uniqueArray(Object.values(localJockeyGroups).flat());
const allJockeys = uniqueArray([...centralJockeys, ...allLocalJockeys]);

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userInfo = document.getElementById("userInfo");
const saveBtn = document.getElementById("saveBtn");

const date = document.getElementById("date");
const bet = document.getElementById("bet");
const pay = document.getElementById("pay");
const place = document.getElementById("place");
const expeditionMode = document.getElementById("expeditionMode");
const jockey1 = document.getElementById("jockey1");
const jockey2 = document.getElementById("jockey2");
const jockey3 = document.getElementById("jockey3");
const type = document.getElementById("type");

const filterType = document.getElementById("filterType");
const filterMonth = document.getElementById("filterMonth");

const summary = document.getElementById("summary");
const history = document.getElementById("history");
const placeStats = document.getElementById("placeStats");
const jockeyStats = document.getElementById("jockeyStats");

function setJockeyOptions(selectEl, jockeyList, selectedValue){
selectEl.innerHTML = '<option value="">騎手選択</option>';
jockeyList.forEach(name=>{
const option = document.createElement("option");
option.value = name;
option.textContent = name;
selectEl.appendChild(option);
});
if(selectedValue && jockeyList.includes(selectedValue)){
selectEl.value = selectedValue;
}else{
selectEl.value = "";
}
}

function getCurrentJockeyList(){
if(expeditionMode.checked){
return allJockeys;
}

if(centralPlaces.includes(place.value)){
return centralJockeys;
}

if(placeToLocalGroup[place.value]){
return localJockeyGroups[placeToLocalGroup[place.value]];
}

return allJockeys;
}

function updateJockeyOptions(){
const current1 = jockey1.value;
const current2 = jockey2.value;
const current3 = jockey3.value;
const list = getCurrentJockeyList();

setJockeyOptions(jockey1, list, current1);
setJockeyOptions(jockey2, list, current2);
setJockeyOptions(jockey3, list, current3);
}

function updateJockeyFields() {
jockey2.style.display = "none";
jockey3.style.display = "none";
jockey2.value = "";
jockey3.value = "";

if (type.value === "ワイド" || type.value === "馬連" || type.value === "馬単") {
jockey2.style.display = "inline";
}

if (type.value === "3連複" || type.value === "3連単") {
jockey2.style.display = "inline";
jockey3.style.display = "inline";
}
}

type.onchange = () => {
updateJockeyFields();
updateJockeyOptions();
};

place.onchange = updateJockeyOptions;
expeditionMode.onchange = updateJockeyOptions;

updateJockeyFields();
updateJockeyOptions();

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore, collection, addDoc, getDocs,
query, orderBy, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
projectId: "keiba-dashboard-1f6c4"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth,(u)=>{
user=u;
if(u){
userInfo.innerText="ログイン:"+u.email;
loginBtn.style.display="none";
logoutBtn.style.display="inline";
loadData();
}else{
userInfo.innerText="未ログイン";
loginBtn.style.display="inline";
logoutBtn.style.display="none";
summary.innerHTML = "";
history.innerHTML = "";
placeStats.innerHTML = "";
jockeyStats.innerHTML = "";
}
});

function buildJockeyValue() {
if (!jockey1.value) return "";

if (type.value === "単勝" || type.value === "複勝") {
return jockey1.value;
}

if (type.value === "ワイド" || type.value === "馬連" || type.value === "馬単") {
if (!jockey2.value) return "";
return jockey1.value + " / " + jockey2.value;
}

if (type.value === "3連複" || type.value === "3連単") {
if (!jockey2.value || !jockey3.value) return "";
return jockey1.value + " / " + jockey2.value + " / " + jockey3.value;
}

return jockey1.value;
}

saveBtn.onclick = async () => {
if(!user){
alert("ログインしてください");
return;
}

if(!date.value){
alert("日付を入力してください");
return;
}

if(bet.value === ""){
alert("投資を入力してください");
return;
}

if(pay.value === ""){
alert("回収を入力してください");
return;
}

const jockeyValue = buildJockeyValue();

if(!jockeyValue){
if (type.value === "単勝" || type.value === "複勝") {
alert("騎手を1人選択してください");
return;
}
if (type.value === "ワイド" || type.value === "馬連" || type.value === "馬単") {
alert("騎手を2人選択してください");
return;
}
if (type.value === "3連複" || type.value === "3連単") {
alert("騎手を3人選択してください");
return;
}
}

await addDoc(collection(db,"bets"),{
uid:user.uid,
date:date.value,
bet:+bet.value,
pay:+pay.value,
type:type.value,
place:place.value || "未設定",
jockey:jockeyValue || "未設定",
createdAt:new Date()
});

loadData();
};

window.del = async (id)=>{
await deleteDoc(doc(db,"bets",id));
loadData();
};

window.edit = async (id, vEnc)=>{
const v = JSON.parse(decodeURIComponent(vEnc));
const b = prompt("投資", v.bet);
if (b === null) return;
const p = prompt("回収", v.pay);
if (p === null) return;

await updateDoc(doc(db,"bets",id),{
bet:+b,
pay:+p
});

loadData();
};

async function loadData(){

if(!user) return;

const snap = await getDocs(query(collection(db,"bets"),orderBy("createdAt","desc")));

let tb=0,tp=0;
let placeObj={}, jockeyObj={};
let html="";

snap.forEach(d=>{
const v=d.data();
if(v.uid!==user.uid)return;

if(filterType.value !== "all" && v.type !== filterType.value) return;
if(filterMonth.value && (!v.date || !v.date.startsWith(filterMonth.value))) return;

tb+=Number(v.bet || 0);
tp+=Number(v.pay || 0);

placeObj[v.place]=(placeObj[v.place]||{b:0,p:0});
placeObj[v.place].b+=Number(v.bet || 0);
placeObj[v.place].p+=Number(v.pay || 0);

jockeyObj[v.jockey]=(jockeyObj[v.jockey]||{b:0,p:0});
jockeyObj[v.jockey].b+=Number(v.bet || 0);
jockeyObj[v.jockey].p+=Number(v.pay || 0);

const enc = encodeURIComponent(JSON.stringify(v));

html+=`
<div>
${v.date} ${v.type} ${v.place} ${v.jockey}
投資:${v.bet} 回収:${v.pay}
<button onclick="window.edit('${d.id}','${enc}')">修正</button>
<button onclick="window.del('${d.id}')">削除</button>
</div>`;
});

summary.innerHTML=`
投資:${tb} 回収:${tp}
回収率:${tb?((tp/tb)*100).toFixed(2):0}%
`;

let phtml="";
for(let k in placeObj){
phtml+=`${k}:${placeObj[k].p-placeObj[k].b}<br>`;
}
placeStats.innerHTML=phtml;

let jhtml="";
for(let k in jockeyObj){
jhtml+=`${k}:${jockeyObj[k].p-jockeyObj[k].b}<br>`;
}
jockeyStats.innerHTML=jhtml;

history.innerHTML=html;
}

</script>

</html>
