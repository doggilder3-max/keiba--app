<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード</title>

<style>
body { font-family: sans-serif; padding: 15px; background:#f5f5f5; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
input, select, button { padding:8px; margin:5px; }
button { cursor:pointer; }
#userInfo { margin:10px 0; font-weight:bold; }
</style>

</head>
<body>

<h2>🏇 競馬収支ダッシュボード</h2>

<div id="userInfo">未ログイン</div>

<button id="loginBtn">Googleログイン</button>
<button id="anonBtn">匿名ログイン</button>

<div class="card">
  <h3>収支入力</h3>

  <input id="date" type="date">

  <input id="bet" placeholder="投資額" type="number">
  <input id="pay" placeholder="回収額" type="number">

  <select id="type">
    <option value="単勝">単勝</option>
    <option value="複勝">複勝</option>
    <option value="ワイド">ワイド</option>
    <option value="馬連">馬連</option>
    <option value="馬単">馬単</option>
    <option value="3連複">3連複</option>
    <option value="3連単">3連単</option>
  </select>

  <button id="saveBtn">保存</button>
</div>

<div class="card">
  <h3>結果</h3>
  <div id="result"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


// 🔥 あなたのFirebase設定
const firebaseConfig = {
    apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
    authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
    projectId: "keiba-dashboard-1f6c4",
    storageBucket: "keiba-dashboard-1f6c4.firebasestorage.app",
    messagingSenderId: "1024448079737",
    appId: "1:1024448079737:web:ede5a817db713189b271a8",
    measurementId: "G-XGHG8N63CW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

const loginBtn = document.getElementById("loginBtn");
const anonBtn = document.getElementById("anonBtn");

// ========================
// 🔐 ログイン
// ========================
loginBtn.onclick = () => {
  signInWithPopup(auth, new GoogleAuthProvider());
};

anonBtn.onclick = async () => {
  await signInAnonymously(auth);
};

// ========================
// 👤 ログイン状態監視
// ========================
onAuthStateChanged(auth, (user) => {
  currentUser = user;

  const userInfo = document.getElementById("userInfo");

  if (user) {
    loginBtn.style.display = "none";
    anonBtn.style.display = "none";

    userInfo.innerText = `ログイン中：${user.uid}`;
    console.log("ログイン成功:", user.uid);

    loadData();
  } else {
    userInfo.innerText = "未ログイン";
  }
});

// ========================
// 💾 保存
// ========================
document.getElementById("saveBtn").onclick = async () => {

  if (!currentUser) {
    alert("ログインしてください");
    return;
  }

  const date = document.getElementById("date").value;
  const bet = Number(document.getElementById("bet").value);
  const pay = Number(document.getElementById("pay").value);
  const type = document.getElementById("type").value;

  if (!bet || !pay) return;

  await addDoc(collection(db, "bets"), {
    uid: currentUser.uid,
    date,
    bet,
    pay,
    type,
    roi: (pay / bet) * 100,
    createdAt: new Date()
  });

  loadData();
};

// ========================
// 📊 データ読み込み
// ========================
async function loadData() {

  const q = query(collection(db, "bets"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  let totalBet = 0;
  let totalPay = 0;

  snap.forEach(doc => {
    const d = doc.data();

    if (currentUser && d.uid !== currentUser.uid) return;

    totalBet += d.bet;
    totalPay += d.pay;
  });

  const roi = totalBet ? (totalPay / totalBet) * 100 : 0;

  document.getElementById("result").innerHTML = `
    <p>総投資：${totalBet}円</p>
    <p>総回収：${totalPay}円</p>
    <p>ROI：${roi.toFixed(2)}%</p>
  `;
}

</script>

</body>
</html>
