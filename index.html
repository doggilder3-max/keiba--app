<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード</title>
<style>
body { font-family:sans-serif; padding:15px; background:#f5f5f5; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
input, select, button { padding:8px; margin:5px; }
.win { color:green; }
.lose { color:red; }
</style>
</head>
<body>

<h2>🏇 競馬収支ダッシュボード</h2>

<button id="loginBtn">Googleログイン</button>
<button id="anonBtn">匿名ログイン</button>

<div class="card">
  <h3>収支入力</h3>
  <input id="bet" placeholder="投資額" type="number">
  <input id="pay" placeholder="回収額" type="number">
  <select id="type">
    <option value="馬連">馬連</option>
    <option value="馬単">馬単</option>
    <option value="3連複">3連複</option>
    <option value="3連単">3連単</option>
  </select>
  <button id="saveBtn">保存</button>
</div>

<div class="card">
  <h3>結果</h3>
  <div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ここにあなたのfirebaseConfigをそのまま貼る
const firebaseConfig = {
    apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
    authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
    projectId: "keiba-dashboard-1f6c4",
    storageBucket: "keiba-dashboard-1f6c4.firebasestorage.app",
    messagingSenderId: "1024448079737",
    appId: "1:1024448079737:web:ede5a817db713189b271a8",
    measurementId: "G-XGHG8N63CW"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ログイン処理
document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
document.getElementById("anonBtn").onclick = () => signInAnonymously(auth);

// 保存処理
document.getElementById("saveBtn").onclick = async () => {
    const bet = Number(document.getElementById("bet").value);
    const pay = Number(document.getElementById("pay").value);
    const type = document.getElementById("type").value;

    if (!bet || !pay) return;

    await addDoc(collection(db, "bets"), {
        bet,
        pay,
        type,
        roi: (pay / bet) * 100,
        createdAt: new Date()
    });

    loadData();
};

// データ読み込み＋結果表示
async function loadData() {
    const snap = await getDocs(collection(db, "bets"));
    let totalBet = 0, totalPay = 0;

    snap.forEach(doc => {
        const d = doc.data();
        totalBet += d.bet;
        totalPay += d.pay;
    });

    const roi = totalBet ? (totalPay / totalBet) * 100 : 0;
    document.getElementById("result").innerHTML = `
        <p>総投資：${totalBet}円</p>
        <p>総回収：${totalPay}円</p>
        <p>ROI：${roi.toFixed(2)}%</p>
    `;
}

loadData();
</script>
</body>
</html>
