<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:15px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }
input, select, button { padding:8px; margin:5px; cursor:pointer; }

#userInfo { font-weight:bold; margin:10px 0; }

.good { color:green; font-weight:bold; }
.bad { color:red; font-weight:bold; }
</style>

</head>
<body>

<h2>🏇 競馬収支ダッシュボード Pro</h2>

<div id="userInfo">未ログイン</div>

<button id="loginBtn">Googleログイン</button>
<button id="anonBtn">匿名ログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<div class="card">
  <h3>収支入力</h3>

  <input id="date" type="date">
  <input id="bet" type="number" placeholder="投資額">
  <input id="pay" type="number" placeholder="回収額">

  <select id="type">
    <option>単勝</option>
    <option>複勝</option>
    <option>ワイド</option>
    <option>馬連</option>
    <option>馬単</option>
    <option>3連複</option>
    <option>3連単</option>
  </select>

  <button id="saveBtn">保存</button>
</div>

<div class="card">
  <h3>📊 収支合計</h3>
  <div id="summary"></div>
</div>

<div class="card">
  <h3>📈 収支グラフ</h3>
  <canvas id="chart"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signInAnonymously,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
  authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
  projectId: "keiba-dashboard-1f6c4",
  storageBucket: "keiba-dashboard-1f6c4.firebasestorage.app",
  messagingSenderId: "1024448079737",
  appId: "1:1024448079737:web:ede5a817db713189b271a8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let chartInstance = null;

// =====================
// ボタン
// =====================
const loginBtn = document.getElementById("loginBtn");
const anonBtn = document.getElementById("anonBtn");
const logoutBtn = document.getElementById("logoutBtn");

// =====================
// ログイン
// =====================
loginBtn.onclick = () => {
  signInWithPopup(auth, new GoogleAuthProvider());
};

anonBtn.onclick = () => {
  signInAnonymously(auth);
};

// =====================
// ログアウト（追加）
// =====================
logoutBtn.onclick = () => {
  signOut(auth);
};

// =====================
// 状態監視（超重要）
// =====================
onAuthStateChanged(auth, (user) => {
  currentUser = user;

  const info = document.getElementById("userInfo");

  if (user) {

    let type = user.isAnonymous ? "匿名ログイン" : "Googleログイン";

    info.innerText = `ログイン中（${type}）：${user.uid}`;

    loginBtn.style.display = "none";
    anonBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";

    loadData();

  } else {

    info.innerText = "未ログイン";

    loginBtn.style.display = "inline-block";
    anonBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }
});

// =====================
// 保存
// =====================
document.getElementById("saveBtn").onclick = async () => {

  if (!currentUser) return alert("ログインしてください");

  const date = document.getElementById("date").value;
  const bet = Number(document.getElementById("bet").value);
  const pay = Number(document.getElementById("pay").value);
  const type = document.getElementById("type").value;

  await addDoc(collection(db, "bets"), {
    uid: currentUser.uid,
    date,
    bet,
    pay,
    type,
    createdAt: new Date()
  });

  loadData();
};

// =====================
// データ取得
// =====================
async function loadData() {

  if (!currentUser) return;

  const q = query(collection(db, "bets"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  let totalBet = 0;
  let totalPay = 0;

  let labels = [];
  let data = [];

  snap.forEach(doc => {
    const d = doc.data();

    if (d.uid !== currentUser.uid) return;

    totalBet += d.bet;
    totalPay += d.pay;

    labels.push(d.date);
    data.push(d.pay - d.bet);
  });

  const recoveryRate = totalBet ? (totalPay / totalBet) * 100 : 0;

  document.getElementById("summary").innerHTML = `
    <p>総投資：${totalBet}円</p>
    <p>総回収：${totalPay}円</p>
    <p class="${recoveryRate >= 100 ? 'good' : 'bad'}">
      回収率：${recoveryRate.toFixed(2)}%
    </p>
  `;

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chart");

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels.reverse(),
      datasets: [{
        label: "日別収支",
        data: data.reverse()
      }]
    }
  });
}

</script>

</body>
</html>
