<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:15px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }
input, select, button { padding:8px; margin:5px; }
.hidden { display:none; }
</style>
</head>

<body>

<h2>🏇 競馬収支ダッシュボード</h2>

<div id="userInfo"></div>

<button id="loginBtn">Googleログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<div class="card">
<h3>収支入力</h3>

<input id="date" type="date">
<input id="bet" type="number" placeholder="投資">
<input id="pay" type="number" placeholder="回収">

<select id="place">
<option value="">競馬場選択</option>
<optgroup label="中央競馬">
<option>東京</option><option>札幌</option><option>函館</option><option>福島</option>
<option>中山</option><option>新潟</option><option>中京</option>
<option>京都</option><option>阪神</option><option>小倉</option>
</optgroup>
<optgroup label="地方競馬">
<option>帯広</option><option>門別</option><option>盛岡</option><option>水沢</option>
<option>浦和</option><option>船橋</option><option>大井</option><option>川崎</option>
<option>金沢</option><option>笠松</option><option>名古屋</option>
<option>園田</option><option>姫路</option><option>高知</option><option>佐賀</option>
</optgroup>
</select>

<!-- 遠征対応 -->
<label>
<input type="checkbox" id="allJockeyToggle">
全騎手表示（遠征対応）
</label>

<div>
<select id="jockey1"></select>
<select id="jockey2" class="hidden"></select>
<select id="jockey3" class="hidden"></select>
</div>

<select id="type">
<option>単勝</option>
<option>複勝</option>
<option>ワイド</option>
<option>馬連</option>
<option>馬単</option>
<option>3連複</option>
<option>3連単</option>
</select>

<button id="saveBtn">保存</button>
</div>

<!-- 以下そのまま -->
<div class="card"><h3>📊 収支</h3><div id="summary"></div></div>
<div class="card"><h3>📋 履歴</h3><div id="history"></div></div>
<div class="card"><h3>🏟 競馬場別</h3><div id="placeStats"></div></div>
<div class="card"><h3>🏇 騎手別</h3><div id="jockeyStats"></div></div>

<script type="module">

/* ===== 中央騎手 ===== */
const centralJockeys = [
"秋山稔樹","池添謙一","川田将雅","武豊","クリストフ・ルメール","戸崎圭太","横山武史"
];

/* ===== 地方騎手（全追加） ===== */
const localJockeys = [
"阿部龍","石川倭","岩橋勇二","落合玄太","小野楓馬","桑村真明","服部茂史",
"赤塚健仁","阿部武臣","菊池一樹","西謙一","鈴木恵介",
"阿部英俊","岩本怜","高松亮","村上忍",
"笹川翼","御神本訓史","矢野貴之","森泰斗","吉原寛人",
"本田正重","和田譲治","山崎誠士","町田直希",
"青柳正義","吉原寛人",
"今井貴大","丸野勝虎",
"大山真吾","吉村智洋",
"赤岡修次","永森大智","宮川実",
"山口勲"
];

/* ===== 競馬場 ===== */
const centralPlaces = ["東京","札幌","函館","福島","中山","新潟","中京","京都","阪神","小倉"];

/* ===== 全騎手 ===== */
const allJockeys = [...new Set([...centralJockeys, ...localJockeys])];

/* ===== プルダウン生成 ===== */
function setJockeyOptions(list){
[jockey1,jockey2,jockey3].forEach(select=>{
select.innerHTML='<option value="">騎手選択</option>';
list.forEach(j=>{
select.innerHTML += `<option>${j}</option>`;
});
});
}

/* ===== 初期 ===== */
setJockeyOptions(centralJockeys);

/* ===== 切替ロジック ===== */
function updateJockeyList(){

if(allJockeyToggle.checked){
setJockeyOptions(allJockeys);
return;
}

let list = centralPlaces.includes(place.value)
? centralJockeys
: localJockeys;

setJockeyOptions(list);
}

place.onchange = updateJockeyList;
allJockeyToggle.onchange = updateJockeyList;

/* ===== 券種制御 ===== */
type.onchange = ()=>{
jockey2.classList.add("hidden");
jockey3.classList.add("hidden");

if(["ワイド","馬連","馬単"].includes(type.value)){
jockey2.classList.remove("hidden");
}
if(["3連複","3連単"].includes(type.value)){
jockey2.classList.remove("hidden");
jockey3.classList.remove("hidden");
}
};

/* ===== Firebase（そのまま） ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore, collection, addDoc, getDocs,
query, orderBy, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user=null;

loginBtn.onclick=()=>signInWithPopup(auth,new GoogleAuthProvider());
logoutBtn.onclick=()=>signOut(auth);

onAuthStateChanged(auth,(u)=>{
user=u;
if(u){
userInfo.innerText="ログイン:"+u.email;
loginBtn.style.display="none";
logoutBtn.style.display="inline";
loadData();
}
});

/* ===== 保存 ===== */
saveBtn.onclick=async()=>{
let j=[jockey1.value,jockey2.value,jockey3.value].filter(v=>v);
await addDoc(collection(db,"bets"),{
uid:user.uid,
date:date.value,
bet:+bet.value,
pay:+pay.value,
type:type.value,
place:place.value || "未設定",
jockey:j.join(" / "),
createdAt:new Date()
});
loadData();
};

/* ===== 表示 ===== */
window.del=async(id)=>{await deleteDoc(doc(db,"bets",id));loadData();};

async function loadData(){
const snap=await getDocs(query(collection(db,"bets"),orderBy("createdAt","desc")));
let tb=0,tp=0,placeStatsObj={},jockeyStatsObj={};
let html="";
snap.forEach(d=>{
const v=d.data();
if(v.uid!==user.uid)return;
tb+=v.bet; tp+=v.pay;

placeStatsObj[v.place]=(placeStatsObj[v.place]||{b:0,p:0});
placeStatsObj[v.place].b+=v.bet;
placeStatsObj[v.place].p+=v.pay;

jockeyStatsObj[v.jockey]=(jockeyStatsObj[v.jockey]||{b:0,p:0});
jockeyStatsObj[v.jockey].b+=v.bet;
jockeyStatsObj[v.jockey].p+=v.pay;

html+=`<div>${v.date} ${v.type} ${v.place} ${v.jockey}
投資:${v.bet} 回収:${v.pay}
<button onclick="del('${d.id}')">削除</button></div>`;
});

summary.innerHTML=`投資:${tb} 回収:${tp} 回収率:${tb?((tp/tb)*100).toFixed(2):0}%`;
placeStats.innerHTML=Object.keys(placeStatsObj).map(k=>`${k}:${placeStatsObj[k].p-placeStatsObj[k].b}`).join("<br>");
jockeyStats.innerHTML=Object.keys(jockeyStatsObj).map(k=>`${k}:${jockeyStatsObj[k].p-jockeyStatsObj[k].b}`).join("<br>");
history.innerHTML=html;
}

</script>
</body>
</html>
