<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KEIBA DASHBOARD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:#e5e7eb;
}

header {
  padding:20px;
  font-size:20px;
  font-weight:bold;
  background:#111827;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container {
  padding:20px;
  max-width:1000px;
  margin:auto;
}

/* KPI */
.kpi {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:20px;
}

.card {
  background:#1f2937;
  padding:15px;
  border-radius:12px;
}

.kpi .value {
  font-size:22px;
  font-weight:bold;
}

/* 入力 */
.input-card {
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

input, select, button {
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

/* グラフ */
.chart-card {
  background:#1f2937;
  padding:15px;
  border-radius:12px;
}

/* ボタン */
button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}

button:hover {
  opacity:0.8;
}

#userInfo {
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>
  🏇 KEIBA DASHBOARD
  <div id="userInfo">未ログイン</div>
</header>

<div class="container">

<button id="loginBtn">Googleログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<!-- KPI -->
<div class="kpi">
  <div class="card">
    <div>総投資</div>
    <div class="value" id="totalBet">0円</div>
  </div>
  <div class="card">
    <div>総回収</div>
    <div class="value" id="totalPay">0円</div>
  </div>
  <div class="card">
    <div>回収率</div>
    <div class="value" id="rate">0%</div>
  </div>
</div>

<!-- 入力 -->
<div class="input-card">
  <h3>収支入力</h3>

  <input id="date" type="date">
  <input id="bet" type="number" placeholder="投資">
  <input id="pay" type="number" placeholder="回収">

  <select id="type">
    <option>単勝</option>
    <option>複勝</option>
    <option>ワイド</option>
    <option>馬連</option>
    <option>3連複</option>
    <option>3連単</option>
  </select>

  <button id="saveBtn">保存</button>
</div>

<!-- グラフ -->
<div class="chart-card">
  <h3>収支推移</h3>
  <canvas id="chart"></canvas>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
  authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
  projectId: "keiba-dashboard-1f6c4",
});

const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let chart = null;

// UI
loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
logoutBtn.onclick = () => signOut(auth);

// auth
onAuthStateChanged(auth, (u) => {
  user = u;

  if (u) {
    userInfo.innerText = u.email;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    load();
  } else {
    userInfo.innerText = "未ログイン";
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }
});

// 保存
saveBtn.onclick = async () => {
  if (!user) return alert("ログインしてください");

  await addDoc(collection(db,"bets"), {
    uid:user.uid,
    date:date.value,
    bet:Number(bet.value),
    pay:Number(pay.value),
    type:type.value,
    createdAt:new Date()
  });

  load();
};

// 読み込み
async function load() {
  const q = query(collection(db,"bets"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);

  let tb=0,tp=0;
  let labels=[],data=[];

  snap.forEach(d=>{
    const x=d.data();
    if(x.uid!==user.uid) return;

    tb+=x.bet;
    tp+=x.pay;

    labels.push(x.date);
    data.push(x.pay-x.bet);
  });

  const rate = tb ? (tp/tb)*100 : 0;

  totalBet.innerText = tb+"円";
  totalPay.innerText = tp+"円";
  rate.innerText = rate.toFixed(1)+"%";

  if(chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type:"line",
    data:{
      labels:labels.reverse(),
      datasets:[{
        label:"収支",
        data:data.reverse()
      }]
    }
  });
}

</script>

</body>
</html>
