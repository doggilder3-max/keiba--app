<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; padding: 15px; background: #f5f5f5; }
input, button, select {
  padding: 14px; margin: 6px 0; width: 100%; font-size: 16px;
}
button { background: #007bff; color: white; border: none; }
.card { background: white; padding: 15px; margin-top: 12px; border-radius: 12px; }
.win { color: green; }
.lose { color: red; }
</style>
</head>
<body>

<h2>競馬収支管理</h2>

<input type="date" id="date">
<input type="number" id="bet" placeholder="投資額">
<input type="number" id="win" placeholder="回収額">
<button onclick="addData()">追加</button>

<div class="card">
<p>合計投資：<span id="totalBet">0</span>円</p>
<p>合計回収：<span id="totalWin">0</span>円</p>
<p>収支：<span id="profit">0</span>円</p>
<p>回収率：<span id="rate">0</span>%</p>
</div>

<div class="card">
<h3>月選択</h3>
<select id="monthSelect"></select>
</div>

<div class="card">
<h3>月の収支</h3>
<p>投資：<span id="monthBet">0</span>円</p>
<p>回収：<span id="monthWin">0</span>円</p>
<p>収支：<span id="monthProfit">0</span>円</p>
<p>回収率：<span id="monthRate">0</span>%</p>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>履歴</h3>
<div id="history"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("keiba")) || [];
document.getElementById("date").valueAsDate = new Date();

let chart;

// =======================
// 月選択初期化
// =======================
function initMonthSelect(){
  const select = document.getElementById("monthSelect");

  let months = [...new Set(data.map(d => d.date.slice(0,7)))]
    .sort()
    .reverse();

  const now = new Date().toISOString().slice(0,7);

  if(!months.includes(now)) months.unshift(now);

  select.innerHTML = months.map(m =>
    `<option value="${m}">${m}</option>`
  ).join("");

  select.value = now;

  select.onchange = update;
}

// =======================
// データ追加（ID付与）
// =======================
function addData(){
  let date = document.getElementById("date").value;
  let bet = Number(document.getElementById("bet").value);
  let win = Number(document.getElementById("win").value);

  if(!bet && !win) return;

  data.push({
    id: Date.now(),   // ★ここが重要（ID）
    date,
    bet,
    win
  });

  localStorage.setItem("keiba", JSON.stringify(data));

  document.getElementById("bet").value = "";
  document.getElementById("win").value = "";

  initMonthSelect();
  update();
}

// =======================
// 削除（IDで安全削除）
// =======================
function deleteData(id){
  data = data.filter(d => d.id !== id);
  localStorage.setItem("keiba", JSON.stringify(data));

  initMonthSelect();
  update();
}

// =======================
// 全体更新
// =======================
function update(){

  let totalBet = data.reduce((a,b)=>a+b.bet,0);
  let totalWin = data.reduce((a,b)=>a+b.win,0);

  document.getElementById("totalBet").textContent = totalBet;
  document.getElementById("totalWin").textContent = totalWin;
  document.getElementById("profit").textContent = totalWin - totalBet;
  document.getElementById("rate").textContent =
    totalBet ? ((totalWin/totalBet)*100).toFixed(1) : 0;

  let month = document.getElementById("monthSelect").value || new Date().toISOString().slice(0,7);

  let monthData = data.filter(d => d.date.startsWith(month));

  let mBet = monthData.reduce((a,b)=>a+b.bet,0);
  let mWin = monthData.reduce((a,b)=>a+b.win,0);

  document.getElementById("monthBet").textContent = mBet;
  document.getElementById("monthWin").textContent = mWin;
  document.getElementById("monthProfit").textContent = mWin - mBet;
  document.getElementById("monthRate").textContent =
    mBet ? ((mWin/mBet)*100).toFixed(1) : 0;

  drawChart(monthData);
  drawHistory(monthData);
}

// =======================
// グラフ
// =======================
function drawChart(monthData){
  let labels = monthData.map(d=>d.date);
  let profits = monthData.map(d=>d.win - d.bet);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "収支",
        data: profits
      }]
    }
  });
}

// =======================
// 履歴表示（IDベース削除）
// =======================
function drawHistory(monthData){
  let html = "";

  monthData.slice().reverse().forEach(d=>{
    let profit = d.win - d.bet;
    let cls = profit >= 0 ? "win" : "lose";

    html += `
      <div class="${cls}">
        ${d.date} / ${profit}円
        <button onclick="deleteData(${d.id})">削除</button>
      </div>
    `;
  });

  document.getElementById("history").innerHTML = html;
}

// =======================
// 初期化
// =======================
initMonthSelect();
update();

</script>

</body>
</html>
