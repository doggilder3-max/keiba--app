<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:15px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }

input, select, button { padding:8px; margin:5px; }

.good { color:green; font-weight:bold; }
.bad { color:red; font-weight:bold; }

.deleteBtn { background:#ff4d4d; color:#fff; border:none; padding:5px; }
.editBtn { background:#4d79ff; color:#fff; padding:5px; }
</style>
</head>

<body>

<h2>🏇 競馬収支ダッシュボード</h2>

<div id="userInfo"></div>

<button id="loginBtn">Googleログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<div class="card">
<h3>収支入力</h3>

<input id="date" type="date">
<input id="bet" type="number" placeholder="投資">
<input id="pay" type="number" placeholder="回収">

<select id="place">
<option value="">競馬場選択</option>
<option>東京</option>
<option>札幌</option>
<option>函館</option>
<option>福島</option>
<option>中山</option>
<option>新潟</option>
<option>中京</option>
<option>京都</option>
<option>阪神</option>
<option>小倉</option>
</select>

<!-- 騎手（動的） -->
<select id="jockey1"></select>
<select id="jockey2" style="display:none;"></select>
<select id="jockey3" style="display:none;"></select>

<select id="type">
<option>単勝</option>
<option>複勝</option>
<option>ワイド</option>
<option>馬連</option>
<option>馬単</option>
<option>3連複</option>
<option>3連単</option>
</select>

<button id="saveBtn">保存</button>
</div>

<div class="card">
<h3>フィルター</h3>
<select id="filterType">
<option value="all">全て</option>
<option>単勝</option>
<option>複勝</option>
<option>ワイド</option>
<option>馬連</option>
<option>馬単</option>
<option>3連複</option>
<option>3連単</option>
</select>

<input id="filterMonth" type="month">
<button onclick="loadData()">適用</button>
</div>

<div class="card"><h3>📊 収支</h3><div id="summary"></div></div>
<div class="card"><h3>📋 履歴</h3><div id="history"></div></div>
<div class="card"><h3>🏟 競馬場別</h3><div id="placeStats"></div></div>
<div class="card"><h3>🏇 騎手別</h3><div id="jockeyStats"></div></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore, collection, addDoc, getDocs,
query, orderBy, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
projectId: "keiba-dashboard-1f6c4"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

/* ========= 騎手リスト ========= */
const jockeyList = [
"秋山稔樹","五十嵐雄祐","池添謙一","石川裕紀人","石神深一","石神深道","石田拓郎","石橋脩",
"泉谷楓真","伊藤工真","井上敏樹","今村聖奈","岩田望来","岩田康誠","岩部純二","上里直汰",
"上野翔","内田博幸","江田照男","江田勇亮","遠藤汰月","大江原圭","大久保友雅","大野拓弥",
"岡田祥嗣","荻野極","荻野琢真","小沢大仁","小野寺祐太","加藤祥太","金子光希","亀田温心",
"川須栄彦","川田将雅","河原田菜々","川端海翼","川又賢治","菊沢一樹","北村宏司","北村友一",
"城戸義政","草野太郎","クリストフ・ルメール","黒岩悠","国分恭介","国分優作","小坂忠士",
"小崎綾也","小林脩斗","小林美駒","小林凌大","小牧加矢太","木幡育也","木幡巧也","木幡初也",
"斎藤新","酒井学","坂井瑠星","佐々木大輔","鮫島克駿","鮫島良太","柴田大知","柴田善臣",
"嶋田純次","菅原隆一","菅原明良","杉原誠人","高倉稜","高杉吏麒","田口貫太","武豊",
"田辺裕信","丹内祐次","太宰啓介","団野大成","津村明秀","戸崎圭太","富田暁","西村淳也",
"浜中俊","原優介","藤懸貴志","松山弘平","三浦皇成","幸英明","ミルコ・デムーロ",
"横山和生","横山武史","横山典弘","吉田隼人","吉田豊"
];

const jockey1 = document.getElementById("jockey1");
const jockey2 = document.getElementById("jockey2");
const jockey3 = document.getElementById("jockey3");
const type = document.getElementById("type");

function initJockeySelects(){
[jockey1,jockey2,jockey3].forEach(sel=>{
sel.innerHTML = `<option value="">騎手選択</option>` +
jockeyList.map(j=>`<option>${j}</option>`).join("");
});
}
initJockeySelects();

/* ========= 騎手数制御 ========= */
type.onchange = () => {
const t = type.value;

jockey2.style.display = "none";
jockey3.style.display = "none";

if(["ワイド","馬連","馬単"].includes(t)){
jockey2.style.display = "inline-block";
}

if(["3連複","3連単"].includes(t)){
jockey2.style.display = "inline-block";
jockey3.style.display = "inline-block";
}
};

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userInfo = document.getElementById("userInfo");
const saveBtn = document.getElementById("saveBtn");

const date = document.getElementById("date");
const bet = document.getElementById("bet");
const pay = document.getElementById("pay");
const place = document.getElementById("place");

const summary = document.getElementById("summary");
const history = document.getElementById("history");
const placeStats = document.getElementById("placeStats");
const jockeyStats = document.getElementById("jockeyStats");

import {
getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore, collection, addDoc, getDocs,
query, orderBy, deleteDoc, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

loginBtn.onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth,(u)=>{
user=u;
if(u){
userInfo.innerText="ログイン:"+u.email;
loginBtn.style.display="none";
logoutBtn.style.display="inline";
loadData();
}else{
userInfo.innerText="未ログイン";
loginBtn.style.display="inline";
logoutBtn.style.display="none";
}
});

/* ========= 保存 ========= */
saveBtn.onclick = async () => {
if(!user) return alert("ログインしてください");

const j1 = jockey1.value;
const j2 = jockey2.value;
const j3 = jockey3.value;

const jockeys = [j1,j2,j3].filter(v=>v);

await addDoc(collection(db,"bets"),{
uid:user.uid,
date:date.value,
bet:+bet.value,
pay:+pay.value,
type:type.value,
place:place.value || "未設定",
jockeys:jockeys,
createdAt:new Date()
});

loadData();
};

/* ========= 削除・編集 ========= */
window.del = async (id)=>{
await deleteDoc(doc(db,"bets",id));
loadData();
};

window.edit = async (id,vEnc)=>{
const v = JSON.parse(decodeURIComponent(vEnc));

const b = prompt("投資",v.bet);
const p = prompt("回収",v.pay);

await updateDoc(doc(db,"bets",id),{
bet:+b,
pay:+p
});

loadData();
};

/* ========= データ読み込み ========= */
async function loadData(){

if(!user) return;

const snap = await getDocs(query(collection(db,"bets"),orderBy("createdAt","desc")));

let tb=0,tp=0;
let placeObj={}, jockeyObj={};

let html="";

snap.forEach(d=>{
const v=d.data();
if(v.uid!==user.uid)return;

tb+=v.bet;
tp+=v.pay;

const jKey = (v.jockeys||[]).join(" / ");

placeObj[v.place]=(placeObj[v.place]||{b:0,p:0});
placeObj[v.place].b+=v.bet;
placeObj[v.place].p+=v.pay;

jockeyObj[jKey]=(jockeyObj[jKey]||{b:0,p:0});
jockeyObj[jKey].b+=v.bet;
jockeyObj[jKey].p+=v.pay;

const enc = encodeURIComponent(JSON.stringify(v));

html+=`
<div>
${v.date} ${v.type} ${v.place} ${jKey}
投資:${v.bet} 回収:${v.pay}
<button onclick="window.edit('${d.id}','${enc}')">修正</button>
<button onclick="del('${d.id}')">削除</button>
</div>`;
});

summary.innerHTML=`
投資:${tb} 回収:${tp}
回収率:${tb?((tp/tb)*100).toFixed(2):0}%
`;

let phtml="";
for(let k in placeObj){
phtml+=`${k}:${placeObj[k].p-placeObj[k].b}<br>`;
}
placeStats.innerHTML=phtml;

let jhtml="";
for(let k in jockeyObj){
jhtml+=`${k}:${jockeyObj[k].p-jockeyObj[k].b}<br>`;
}
jockeyStats.innerHTML=jhtml;

history.innerHTML=html;
}

</script>

</body>
</html>
