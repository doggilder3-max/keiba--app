<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>競馬収支ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:15px; }

.card { background:#fff; padding:15px; margin:10px 0; border-radius:10px; }

input, select, button { padding:8px; margin:5px; cursor:pointer; }

#userInfo { font-weight:bold; margin:10px 0; }

.good { color:green; font-weight:bold; }
.bad { color:red; font-weight:bold; }

.deleteBtn{
  background:#ff4d4d;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
}
</style>

</head>
<body>

<h2>🏇 競馬収支ダッシュボード</h2>

<div id="userInfo">未ログイン</div>

<button id="loginBtn">Googleログイン</button>
<button id="logoutBtn" style="display:none;">ログアウト</button>

<div class="card">
  <h3>収支入力</h3>

  <input id="date" type="date">
  <input id="bet" type="number" placeholder="投資額">
  <input id="pay" type="number" placeholder="回収額">

  <select id="type">
    <option>単勝</option>
    <option>複勝</option>
    <option>ワイド</option>
    <option>馬連</option>
    <option>馬単</option>
    <option>3連複</option>
    <option>3連単</option>
  </select>

  <button id="saveBtn">保存</button>
</div>

<div class="card">
  <h3>📊 収支合計</h3>
  <div id="summary"></div>
</div>

<div class="card">
  <h3>📈 収支グラフ</h3>
  <canvas id="chart"></canvas>
</div>

<!-- ★追加：履歴 -->
<div class="card">
  <h3>📋 履歴</h3>
  <div id="history"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8K2ulpBeavYfDYLBhgAYax5TCrUekds8",
  authDomain: "keiba-dashboard-1f6c4.firebaseapp.com",
  projectId: "keiba-dashboard-1f6c4",
  storageBucket: "keiba-dashboard-1f6c4.firebasestorage.app",
  messagingSenderId: "1024448079737",
  appId: "1:1024448079737:web:ede5a817db713189b271a8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let chartInstance = null;

// =====================
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

// =====================
loginBtn.onclick = () => {
  signInWithPopup(auth, new GoogleAuthProvider());
};

logoutBtn.onclick = () => {
  signOut(auth);
};

// =====================
onAuthStateChanged(auth, (user) => {

  currentUser = user;

  const info = document.getElementById("userInfo");

  if (user) {
    info.innerText = `ログイン中：${user.email}`;
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    loadData();
  } else {
    info.innerText = "未ログイン";
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
  }
});

// =====================
// 保存
// =====================
document.getElementById("saveBtn").onclick = async () => {

  if (!currentUser) return alert("ログインしてください");

  const date = document.getElementById("date").value;
  const bet = Number(document.getElementById("bet").value);
  const pay = Number(document.getElementById("pay").value);
  const type = document.getElementById("type").value;

  await addDoc(collection(db, "bets"), {
    uid: currentUser.uid,
    date,
    bet,
    pay,
    type,
    createdAt: new Date()
  });

  loadData();
};

// =====================
// ★削除機能（追加のみ）
// =====================
async function deleteData(id){
  await deleteDoc(doc(db,"bets",id));
  loadData();
}

// =====================
// データ取得
// =====================
async function loadData() {

  if (!currentUser) return;

  const q = query(collection(db, "bets"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);

  let totalBet = 0;
  let totalPay = 0;

  let labels = [];
  let data = [];

  let html = "";

  snap.forEach(d => {

    const v = d.data();

    if (v.uid !== currentUser.uid) return;

    totalBet += v.bet;
    totalPay += v.pay;

    labels.push(v.date);
    data.push(v.pay - v.bet);

    // ★履歴UI追加
    html += `
      <div style="border-bottom:1px solid #ddd;padding:5px;">
        ${v.date} | ${v.type} | 投資:${v.bet} 回収:${v.pay}
        <button class="deleteBtn" onclick="window.del('${d.id}')">削除</button>
      </div>
    `;
  });

  const recoveryRate = totalBet ? (totalPay / totalBet) * 100 : 0;

  document.getElementById("summary").innerHTML = `
    <p>総投資：${totalBet}円</p>
    <p>総回収：${totalPay}円</p>
    <p class="${recoveryRate >= 100 ? 'good' : 'bad'}">
      回収率：${recoveryRate.toFixed(2)}%
    </p>
  `;

  document.getElementById("history").innerHTML = html;

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chart");

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels.reverse(),
      datasets: [{
        label: "日別収支",
        data: data.reverse()
      }]
    }
  });
}

// グローバル削除関数
window.del = async (id) => {
  if (!confirm("削除しますか？")) return;
  await deleteDoc(doc(db,"bets",id));
  loadData();
};

</script>

</body>
</html>
